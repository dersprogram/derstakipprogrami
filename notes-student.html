<!doctype html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="color-scheme" content="dark light">
<meta name="theme-color" content="#050912" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f4f6f9" media="(prefers-color-scheme: light)">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Ders Takip Pro</title>
<script type="module" src="assets/js/firebase.js?v=20260521-1"></script>
<script src="assets/js/app-shell.js?v=20260521-1"></script>
<script type="module" src="assets/js/auth.js?v=20260521-1"></script>
<script type="module" src="assets/js/sync.js?v=20260521-1"></script>
<link rel="stylesheet" href="assets/css/tokens.css?v=20260521-1">
<link rel="stylesheet" href="assets/css/base.css?v=20260521-1">
<link rel="stylesheet" href="assets/css/components.css?v=20260521-1">
<link rel="stylesheet" href="assets/css/pages/notes.css?v=20260521-1">
<link rel="stylesheet" href="assets/css/pages/swipe.css">
<style>
.appInner { padding-top: 6px; }
.card { padding: 7px 12px; margin-bottom: 7px; }
.card-head { gap: 10px !important; padding: 3px 2px !important; font-size: .96rem !important; line-height: 1.05 !important; min-height: unset !important; }
.card .accordion { margin-top: 5px; }
textarea { min-height: 70px; font-size: 1rem; }
.title { margin-top: var(--page-head-mt); margin-bottom: var(--page-head-mb); }
.card > .list:empty { display: none; }
</style>
</head>
<body>
<div class="appFrame">
  <div class="appBorder">
    <div class="appInner">
      <div id="lessonScreen">
        <div class="title" id="lessonTitle">Ders</div>

        <div class="card" data-type="not">
          <div class="card-head">
            <span class="icon">edit_note</span>
            Not
            <span class="arrow">&#9662;</span>
          </div>
          <div class="accordion">
            <textarea id="notText"></textarea>
            <button onclick="save('not')">Kaydet</button>
          </div>
          <div class="list" id="notList"></div>
        </div>

        <div class="card" data-type="odev">
          <div class="card-head">
            <span class="icon">edit_note</span>
            Ödev
            <span class="arrow">&#9662;</span>
          </div>
          <div class="accordion">
            <textarea id="odevText"></textarea>
            <button onclick="save('odev')">Kaydet</button>
          </div>
          <div class="list" id="odevList"></div>
        </div>

        <div class="card" data-type="sinav">
          <div class="card-head">
            <span class="icon">edit_note</span>
            Sınav
            <span class="arrow">&#9662;</span>
          </div>
          <div class="accordion">
            <div class="dateWrap">
              <input type="date" id="sinavDate">
              <span class="dateIcon icon">event</span>
            </div>
            <textarea id="sinavText"></textarea>
            <button onclick="save('sinav')">Kaydet</button>
          </div>
          <div class="list" id="sinavList"></div>
        </div>
      </div>

      <div id="dayScreen" class="hidden">
        <div class="title" id="dayTitle">Gün</div>
        <div class="card" data-type="day">
          <div class="card-head">
            Gün Notu
            <span class="arrow">&#9662;</span>
          </div>
          <div class="accordion">
            <textarea id="dayText"></textarea>
            <button onclick="save('day')">Kaydet</button>
          </div>
          <div class="list" id="dayList"></div>
        </div>
      </div>

      <div id="listScreen" class="hidden">
        <div class="pageTitle">
          <span class="icon">edit_note</span>
          NOTLARIM
        </div>
        <div id="allNotes"></div>
      </div>
    </div>
  </div>
</div>

<div class="nav">
  <div class="navItem" data-nav="index">
    <span class="icon">today</span>
    GÜNLÜK
  </div>
  <div class="navItem" data-nav="weekly">
    <span class="icon">view_week</span>
    HAFTALIK
  </div>
  <div class="navItem" data-nav="notes">
    <span class="icon">edit_note</span>
    NOTLAR
  </div>
  <div class="navItem" data-nav="settings">
    <span class="icon">settings</span>
    AYARLAR
  </div>
</div>

<script>
function getAppData(){
  return AppShell.loadAppData() || {};
}

function isGuest(){
  return AppShell.isGuestUser(getAppData());
}

function getTodayDayName(){
  return AppShell.getTodayDayName();
}

function getRequestedDay(){
  const params = new URLSearchParams(location.search);
  if(params.get("day")) return params.get("day");
  const lesson = params.get("lesson") || "";
  if(lesson.startsWith("__DAY__-")){
    return lesson.replace("__DAY__-", "");
  }
  return "";
}

function isRestrictedAccess(dayName){
  return false;
}

function showRestrictedPrompt(){
  AppShell.showRegisterPrompt("Bu özelliğin tamamını kullanmak için kayıt olun.");
}

function setLessonTitle(lesson){
  const parts = lesson.split(" - ");
  const title = document.getElementById("lessonTitle");
  if(!title) return;
  title.innerText = parts.length > 1 ? parts[1] : parts[0];
}

let editId = null;
let editFromList = false;
let currentDay = null;
let lastEditType = null;
let accessLocked = false;
const KEY = "app_notes";

function data(){
  return AppShell.safeJsonParse(localStorage.getItem(KEY), []) || [];
}

function saveData(dataset){
  try{
    localStorage.setItem(KEY, JSON.stringify(dataset));
    localStorage.setItem('app_notes_ts', String(Date.now()));
    localStorage.setItem('app_notes_dirty', '1');
    const uid = AppShell.loadAppData()?.settings?.firebaseUid || "";
    if(uid) localStorage.setItem('app_notes_uid', uid);
  }catch(error){
    console.warn("NOTE STORAGE FAIL", error);
  }
  editId = null;
  AppShell.pushSyncNow?.();
}

function showScreen(name){
  document.getElementById("lessonScreen").classList.add("hidden");
  document.getElementById("dayScreen").classList.add("hidden");
  document.getElementById("listScreen").classList.add("hidden");
  document.getElementById(name).classList.remove("hidden");
}

function applyAccessState(){
  const fields = document.querySelectorAll("#lessonScreen textarea, #lessonScreen input, #dayScreen textarea, #dayScreen input");
  const buttons = document.querySelectorAll("#lessonScreen button, #dayScreen button");
  const heads = document.querySelectorAll("#lessonScreen .card-head, #dayScreen .card-head");

  fields.forEach((field) => { field.disabled = accessLocked; });
  buttons.forEach((button) => {
    button.disabled = accessLocked;
    button.style.opacity = accessLocked ? ".55" : "1";
  });
  heads.forEach((head) => { head.style.opacity = accessLocked ? ".65" : "1"; });
}

const params = new URLSearchParams(location.search);
const lesson = params.get("lesson");
const mode = params.get("mode") || (!lesson ? "list" : null);
const requestedDay = getRequestedDay();
accessLocked = isRestrictedAccess(requestedDay);

if(mode === "list"){
  showScreen("listScreen");
}else if(lesson && lesson.startsWith("__DAY__")){
  currentDay = lesson.replace("__DAY__-", "");
  showScreen("dayScreen");
  document.getElementById("dayTitle").textContent = currentDay;
}else{
  showScreen("lessonScreen");
  if(lesson) setLessonTitle(lesson);
}

function save(type){
  if(accessLocked){
    showRestrictedPrompt();
    return;
  }

  const search = new URLSearchParams(location.search);
  const lessonKey = search.get("lesson");
  const sourceDay = search.get("day") || currentDay || "";

  let text = "";
  let date = "";

  if(type === "not") text = document.getElementById("notText").value;
  if(type === "odev") text = document.getElementById("odevText").value;
  if(type === "sinav"){
    text = document.getElementById("sinavText").value;
    date = document.getElementById("sinavDate").value;
  }
  if(type === "day") text = document.getElementById("dayText").value;
  if(!text && !date) return;

  const dataset = data() || [];
  let updatedId = editId;

  if(editId){
    const item = dataset.find((entry) => entry.id === editId);
    if(item){ item.text = text; item.date = date; }
  }else{
    updatedId = Date.now();
    dataset.push({
      id: updatedId,
      type,
      lesson: lessonKey,
      text,
      date,
      day: new Date().toLocaleDateString("tr-TR"),
      dayName: currentDay,
      sourceDay
    });
  }

  saveData(dataset);
  render();
  renderAll();
  editFromList = false;
  editId = null;

  document.getElementById("notText").value = "";
  document.getElementById("odevText").value = "";
  document.getElementById("sinavText").value = "";
  document.getElementById("sinavDate").value = "";
  document.getElementById("dayText").value = "";

  setTimeout(() => {
    const item = document.querySelector('[data-id="' + updatedId + '"]');
    if(item){
      document.querySelectorAll(".item").forEach((entry) => entry.classList.remove("active"));
      item.classList.add("active");
      item.scrollIntoView({ behavior: "smooth", block: "center" });
    }
  }, 60);

  document.querySelectorAll("#lessonScreen button").forEach((button) => { button.textContent = "Kaydet"; });
  document.querySelectorAll("#dayScreen button").forEach((button) => { button.textContent = "Kaydet"; });
}

function loadPlanFromFirebase(){
  // Öğrenci görünümünde yıllık plan gösterilmez
}

function render(){
  const dataset = data() || [];
  const currentLesson = new URLSearchParams(location.search).get("lesson");

  ["not", "odev", "sinav", "day"].forEach((type) => {
    const list = document.getElementById(type + "List");
    if(!list) return;
    list.innerHTML = "";

    dataset
      .filter((entry) =>
        entry.type === type &&
        (type !== "day" || entry.dayName === currentDay) &&
        (type === "day" || entry.lesson === currentLesson)
      )
      .forEach((entry) => {
        const div = document.createElement("div");
        div.className = "item";
        div.dataset.id = entry.id;

        let text = entry.text;
        if(entry.type === "sinav" && entry.date){
          text = entry.date + " - " + entry.text;
        }

        div.innerHTML = [
          '<div class="item-text">' + text + "</div>",
          '<div class="icons">',
          '<span class="cardIcon editIcon" onclick="event.stopPropagation(); edit(' + entry.id + ')"></span>',
          '<span class="cardIcon deleteIcon" onclick="event.stopPropagation(); del(this,' + entry.id + ')"></span>',
          "</div>"
        ].join("");

        list.appendChild(div);
      });
  });
}

function renderAll(){
  const dataset = data();
  const box = document.getElementById("allNotes");
  box.innerHTML = "";

  const dayNotes = dataset.filter((entry) => entry.type === "day");
  if(dayNotes.length){
    const dayCard = document.createElement("div");
    dayCard.className = "card";
    dayCard.innerHTML = [
      '<div class="card-head day-head">Gün Notları<span class="arrow">&#9662;</span></div>',
      '<div class="accordion day-acc"></div>'
    ].join("");
    box.appendChild(dayCard);

    const acc = dayCard.querySelector(".day-acc");
    acc.innerHTML = dayNotes.map((entry) => [
      '<div class="item" data-id="' + entry.id + '">',
      '<div class="item-text day-note-text"><span class="day-note-badge">' + (entry.dayName || entry.day) + '</span><span class="day-note-content">' + entry.text + "</span></div>",
      '<div class="icons">',
      '<span class="cardIcon editIcon" onclick="event.stopPropagation(); edit(' + entry.id + ')"></span>',
      '<span class="cardIcon deleteIcon" onclick="event.stopPropagation(); del(this,' + entry.id + ')"></span>',
      "</div>",
      "</div>"
    ].join("")).join("");
  }

  const lessonGroups = {};
  dataset.forEach((entry) => {
    if(entry.type === "day") return;
    if(!lessonGroups[entry.lesson]){
      lessonGroups[entry.lesson] = { not: [], odev: [], sinav: [] };
    }
    lessonGroups[entry.lesson][entry.type].push(entry);
  });

  Object.keys(lessonGroups).forEach((lessonKey) => {
    const lessonCard = document.createElement("div");
    lessonCard.className = "card";

    const parts = lessonKey.split(" - ");
    const les = parts.length > 1 ? parts.slice(1).join(" - ") : parts[0];

    lessonCard.innerHTML = [
      '<div class="card-head lesson-head">',
      '<span class="les">' + les + "</span>",
      '<span class="arrow">&#9662;</span>',
      "</div>",
      '<div class="accordion lesson-acc"></div>'
    ].join("");

    box.appendChild(lessonCard);
    const acc = lessonCard.querySelector(".lesson-acc");

    ["not", "odev", "sinav"].forEach((type) => {
      const entries = lessonGroups[lessonKey][type];
      if(!entries.length) return;

      const subCard = document.createElement("div");
      subCard.className = "card";
      let html = '<div class="badge ' + type + '">' + type.toUpperCase() + "</div>";

      entries.forEach((entry) => {
        let text = entry.text;
        if(entry.type === "sinav" && entry.date){
          text = entry.date + " - " + entry.text;
        }
        html += [
          '<div class="item">',
          '<div class="item-text">' + text + "</div>",
          '<div class="icons">',
          '<span class="cardIcon editIcon" onclick="event.stopPropagation(); edit(' + entry.id + ')"></span>',
          '<span class="cardIcon deleteIcon" onclick="event.stopPropagation(); del(this,' + entry.id + ')"></span>',
          "</div>",
          "</div>"
        ].join("");
      });

      subCard.innerHTML = html;
      acc.appendChild(subCard);
    });
  });

  document.querySelectorAll("#allNotes .item").forEach((div) => {
    div.addEventListener("click", function(){
      document.querySelectorAll("#allNotes .item").forEach((item) => item.classList.remove("active"));
      div.classList.add("active");
    });
  });
}

let timers = {};

function openCard(type){
  const card = document.querySelector('#lessonScreen .card[data-type="' + type + '"]');
  if(!card) return;
  card.classList.add("open");
  card.querySelector(".arrow")?.classList.add("open");
  const button = card.querySelector("button");
  if(button) button.textContent = "Güncelle";
}

function openDayCard(){
  const card = document.querySelector("#dayScreen .card");
  if(!card) return;
  card.classList.add("open");
  card.querySelector(".arrow")?.classList.add("open");
  const button = card.querySelector("button");
  if(button) button.textContent = "Güncelle";
}

function edit(id){
  editFromList = true;
  lastEditType = null;

  document.querySelectorAll("#lessonScreen .card").forEach((card) => {
    card.classList.remove("open");
    card.querySelector(".arrow")?.classList.remove("open");
  });

  const dataset = data();
  const note = dataset.find((entry) => entry.id === id);
  if(!note) return;
  if(isRestrictedAccess(note.sourceDay || note.dayName)){
    showRestrictedPrompt();
    return;
  }

  editId = id;

  if(note.type === "day"){
    lastEditType = "day";
    currentDay = note.dayName;
    history.replaceState(null, "", "?lesson=" + encodeURIComponent(note.lesson));
    showScreen("dayScreen");
    document.getElementById("dayTitle").textContent = note.dayName || note.day;
    document.getElementById("dayText").value = note.text;
    requestAnimationFrame(openDayCard);
  }

  if(note.type === "not"){
    lastEditType = "not";
    history.replaceState(null, "", "?lesson=" + encodeURIComponent(note.lesson));
    showScreen("lessonScreen");
    setLessonTitle(note.lesson);
    document.getElementById("notText").value = note.text;
    render();
    loadPlanFromFirebase();
    requestAnimationFrame(() => openCard("not"));
  }

  if(note.type === "odev"){
    lastEditType = "odev";
    history.replaceState(null, "", "?lesson=" + encodeURIComponent(note.lesson));
    showScreen("lessonScreen");
    setLessonTitle(note.lesson);
    document.getElementById("odevText").value = note.text;
    render();
    loadPlanFromFirebase();
    requestAnimationFrame(() => openCard("odev"));
  }

  if(note.type === "sinav"){
    lastEditType = "sinav";
    history.replaceState(null, "", "?lesson=" + encodeURIComponent(note.lesson));
    showScreen("lessonScreen");
    setLessonTitle(note.lesson);
    document.getElementById("sinavText").value = note.text;
    document.getElementById("sinavDate").value = note.date;
    render();
    loadPlanFromFirebase();
    requestAnimationFrame(() => openCard("sinav"));
  }
}

function del(element, id){
  const note = data().find((entry) => entry.id === id);
  if(note && isRestrictedAccess(note.sourceDay || note.dayName)){
    showRestrictedPrompt();
    return;
  }

  if(!element.classList.contains("confirm")){
    element.classList.add("confirm");
    timers[id] = setTimeout(() => {
      element.classList.remove("confirm");
    }, 3000);
    return;
  }

  const dataset = data().filter((entry) => entry.id !== id);
  saveData(dataset);
  render();
  renderAll();
}

render();
if(mode === "list") renderAll();

window.addEventListener('appDataSynced', function(e) {
  if (e.detail?.notes) { render(); renderAll(); }
});

applyAccessState();

if(accessLocked && mode !== "list") showRestrictedPrompt();

document.addEventListener("click", function(event){
  const head = event.target.closest(".card-head");
  if(!head) return;
  if(accessLocked && head.closest("#lessonScreen, #dayScreen")){
    showRestrictedPrompt();
    return;
  }

  const card = head.parentElement;
  const arrow = head.querySelector(".arrow");
  const group = card.parentElement;

  group.querySelectorAll(":scope > .card").forEach((entry) => {
    if(entry !== card){
      entry.classList.remove("open");
      entry.querySelector(".arrow")?.classList.remove("open");
    }
  });

  card.classList.toggle("open");
  arrow?.classList.toggle("open");

  if(card.classList.contains("open")){
    setTimeout(() => {
      const nav = document.querySelector(".nav");
      const navHeight = nav ? nav.offsetHeight : 80;
      const rect = card.getBoundingClientRect();
      const bottomSpace = window.innerHeight - rect.bottom;
      if(bottomSpace < navHeight + 10){
        const scrollAmount = (navHeight + 20) - bottomSpace;
        window.scrollBy({ top: scrollAmount, behavior: "smooth" });
      }
    }, 200);
  }
});
</script>
</body>
</html>
